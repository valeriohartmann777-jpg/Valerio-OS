<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Train</title>
<style>
  :root {
    --bg: #000000;
    --mint: #6EE7B7;
    --fg: #F5F5F5;
    --muted: #8A8A8A;
    --line: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.03);
    --card-hover: rgba(255,255,255,0.06);
    --mint-dim: rgba(110,231,183,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding: 20px;
    min-height: 100%;
  }
  .wrap { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

  header { display: flex; align-items: baseline; justify-content: space-between; }
  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg);
  }
  .dot { color: var(--mint); }

  /* stats row */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 12px;
  }
  .stat .num {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--mint);
    font-variant-numeric: tabular-nums;
  }
  .stat .lbl {
    margin-top: 3px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* week strip */
  .week { display: flex; gap: 6px; }
  .day {
    flex: 1;
    aspect-ratio: 1 / 1;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    position: relative;
  }
  .day.active {
    background: var(--mint-dim);
    border-color: rgba(110,231,183,0.4);
    color: var(--mint);
  }
  .day.today { border-color: rgba(255,255,255,0.25); }

  /* form */
  form {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  .chip:hover { background: var(--card-hover); color: var(--fg); }
  .chip.sel {
    background: var(--mint-dim);
    border-color: rgba(110,231,183,0.5);
    color: var(--mint);
  }

  .row { display: flex; gap: 10px; align-items: flex-end; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 10px 12px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.12s ease;
    font-variant-numeric: tabular-nums;
  }
  input[type="number"]:focus { border-color: rgba(110,231,183,0.5); }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  .intensity { display: flex; gap: 6px; }
  .iv {
    flex: 1;
    padding: 9px 0;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s ease;
  }
  .iv:hover { background: var(--card-hover); }
  .iv.sel { background: var(--mint-dim); border-color: rgba(110,231,183,0.5); color: var(--mint); }

  button.add {
    background: var(--mint);
    color: #04241A;
    border: none;
    border-radius: 9px;
    padding: 11px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.12s ease, transform 0.06s ease;
  }
  button.add:hover { opacity: 0.9; }
  button.add:active { transform: scale(0.99); }
  button.add:disabled { opacity: 0.35; cursor: not-allowed; }

  /* log list */
  .log { display: flex; flex-direction: column; gap: 8px; }
  .log-head {
    display: flex; align-items: baseline; justify-content: space-between;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    padding: 0 2px;
  }
  .entry {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 11px 13px;
    transition: background 0.12s ease;
  }
  .entry:hover { background: var(--card-hover); }
  .entry .bar {
    width: 3px; height: 30px; border-radius: 3px; background: var(--mint); flex-shrink: 0; opacity: 0.85;
  }
  .entry .main { flex: 1; min-width: 0; }
  .entry .t { font-size: 13px; font-weight: 600; color: var(--fg); }
  .entry .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .entry .meta { text-align: right; flex-shrink: 0; }
  .entry .dur { font-size: 14px; font-weight: 600; color: var(--mint); font-variant-numeric: tabular-nums; }
  .entry .when { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 4px 2px 4px 6px; opacity: 0;
    transition: opacity 0.12s ease, color 0.12s ease; font-family: inherit; flex-shrink: 0;
  }
  .entry:hover .del { opacity: 1; }
  .del:hover { color: #FF6B6B; }

  .empty {
    text-align: center; color: var(--muted); font-size: 12px;
    padding: 24px 0; border: 1px dashed var(--line); border-radius: 11px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Train<span class="dot">.</span></h1>
    <span style="font-size:11px;color:var(--muted);" id="todayLbl"></span>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="sWeek">0</div><div class="lbl">This week</div></div>
    <div class="stat"><div class="num" id="sMin">0</div><div class="lbl">Minutes 7d</div></div>
    <div class="stat"><div class="num" id="sStreak">0</div><div class="lbl">Day streak</div></div>
  </div>

  <div class="week" id="week"></div>

  <form id="form">
    <div class="chips" id="chips"></div>
    <div class="row">
      <div class="field">
        <label for="dur">Duration (min)</label>
        <input type="number" id="dur" min="1" max="600" step="1" placeholder="45" inputmode="numeric">
      </div>
      <div class="field">
        <label>Intensity</label>
        <div class="intensity" id="intensity"></div>
      </div>
    </div>
    <button type="submit" class="add" id="addBtn" disabled>Log session</button>
  </form>

  <div class="log">
    <div class="log-head"><span>Recent</span><span id="logCount"></span></div>
    <div id="list"></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var TYPES = ["Run", "Lift", "Cycle", "Swim", "Yoga", "HIIT", "Walk", "Sport"];
  var INTENSITIES = ["Easy", "Moderate", "Hard"];

  var state = { records: [], type: null, intensity: "Moderate" };

  // ---- host bridge helpers ----
  async function persist() {
    try { await window.Vitality.save(state.records); }
    catch (e) { /* host may be unavailable during dev preview */ }
  }
  async function restore() {
    try {
      var data = await window.Vitality.load();
      state.records = Array.isArray(data) ? data : [];
    } catch (e) { state.records = []; }
  }

  // ---- date helpers ----
  function startOfDay(d) { var x = new Date(d); x.setHours(0,0,0,0); return x; }
  function dayKey(ts) { return startOfDay(ts).getTime(); }
  function startOfWeek() {
    var now = new Date(); var day = (now.getDay() + 6) % 7; // Monday = 0
    var s = startOfDay(now); s.setDate(s.getDate() - day); return s;
  }
  function relTime(ts) {
    var diff = Date.now() - ts, m = Math.floor(diff / 60000);
    if (m < 1) return "just now";
    if (m < 60) return m + "m ago";
    var h = Math.floor(m / 60); if (h < 24) return h + "h ago";
    var d = Math.floor(h / 24); if (d < 7) return d + "d ago";
    return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  // ---- rendering ----
  var el = function (id) { return document.getElementById(id); };

  function renderChips() {
    var c = el("chips"); c.innerHTML = "";
    TYPES.forEach(function (t) {
      var b = document.createElement("button");
      b.type = "button"; b.className = "chip" + (state.type === t ? " sel" : "");
      b.textContent = t;
      b.onclick = function () { state.type = t; renderChips(); syncBtn(); };
      c.appendChild(b);
    });
  }

  function renderIntensity() {
    var c = el("intensity"); c.innerHTML = "";
    INTENSITIES.forEach(function (v) {
      var b = document.createElement("button");
      b.type = "button"; b.className = "iv" + (state.intensity === v ? " sel" : "");
      b.textContent = v;
      b.onclick = function () { state.intensity = v; renderIntensity(); };
      c.appendChild(b);
    });
  }

  function syncBtn() {
    var dur = parseInt(el("dur").value, 10);
    el("addBtn").disabled = !(state.type && dur > 0);
  }

  function renderStats() {
    var wStart = startOfWeek().getTime();
    var wk = state.records.filter(function (r) { return r.ts >= wStart; });
    var sevenAgo = Date.now() - 7 * 86400000;
    var mins = state.records
      .filter(function (r) { return r.ts >= sevenAgo; })
      .reduce(function (a, r) { return a + (r.duration || 0); }, 0);

    el("sWeek").textContent = wk.length;
    el("sMin").textContent = mins;
    el("sStreak").textContent = computeStreak();
  }

  function computeStreak() {
    if (!state.records.length) return 0;
    var days = {};
    state.records.forEach(function (r) { days[dayKey(r.ts)] = true; });
    var streak = 0, cursor = startOfDay(Date.now()).getTime();
    // allow streak to count from today or yesterday
    if (!days[cursor]) cursor -= 86400000;
    while (days[cursor]) { streak++; cursor -= 86400000; }
    return streak;
  }

  function renderWeek() {
    var c = el("week"); c.innerHTML = "";
    var labels = ["M", "T", "W", "T", "F", "S", "S"];
    var wStart = startOfWeek();
    var todayKey = dayKey(Date.now());
    var active = {};
    state.records.forEach(function (r) { active[dayKey(r.ts)] = true; });
    for (var i = 0; i < 7; i++) {
      var d = new Date(wStart); d.setDate(d.getDate() + i);
      var k = d.getTime();
      var div = document.createElement("div");
      div.className = "day" + (active[k] ? " active" : "") + (k === todayKey ? " today" : "");
      div.textContent = labels[i];
      c.appendChild(div);
    }
  }

  function renderList() {
    var list = el("list");
    var recs = state.records.slice().sort(function (a, b) { return b.ts - a.ts; }).slice(0, 12);
    el("logCount").textContent = state.records.length ? state.records.length + " total" : "";
    if (!recs.length) {
      list.innerHTML = '<div class="empty">No sessions yet. Log your first one above.</div>';
      return;
    }
    list.innerHTML = "";
    recs.forEach(function (r) {
      var e = document.createElement("div"); e.className = "entry";
      e.innerHTML =
        '<div class="bar"></div>' +
        '<div class="main"><div class="t"></div><div class="sub"></div></div>' +
        '<div class="meta"><div class="dur"></div><div class="when"></div></div>';
      e.querySelector(".t").textContent = r.type;
      e.querySelector(".sub").textContent = r.intensity;
      e.querySelector(".dur").textContent = r.duration + "m";
      e.querySelector(".when").textContent = relTime(r.ts);
      var del = document.createElement("button");
      del.className = "del"; del.type = "button"; del.textContent = "×";
      del.title = "Delete";
      del.onclick = function () { removeRecord(r.id); };
      e.appendChild(del);
      list.appendChild(e);
    });
  }

  function renderAll() { renderStats(); renderWeek(); renderList(); }

  async function addRecord() {
    var dur = parseInt(el("dur").value, 10);
    if (!state.type || !(dur > 0)) return;
    state.records.push({
      id: (Date.now().toString(36) + Math.random().toString(36).slice(2, 7)),
      type: state.type,
      intensity: state.intensity,
      duration: dur,
      ts: Date.now()
    });
    el("dur").value = "";
    state.type = null;
    renderChips(); syncBtn(); renderAll();
    await persist();
  }

  async function removeRecord(id) {
    state.records = state.records.filter(function (r) { return r.id !== id; });
    renderAll();
    await persist();
  }

  // ---- init ----
  el("form").addEventListener("submit", function (ev) { ev.preventDefault(); addRecord(); });
  el("dur").addEventListener("input", syncBtn);
  el("todayLbl").textContent = new Date().toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });

  renderChips();
  renderIntensity();

  (async function () {
    await restore();
    renderAll();
  })();
})();
</script>
</body>
</html>
