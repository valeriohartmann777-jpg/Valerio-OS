<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Stack · every pill, one screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000; --fg:#fff;
  --gold:#E7C36B; --gold-cool:#F2DCA6; --gold-deep:#4d3d1f; --gold-ink:#2a2107;
  --solid:#15130c; /* solid dropdown + sheets: never see-through, on purpose */
  --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.72);
  --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16);
  --card:rgba(255,255,255,.02);
  --r-card:18px; --r-pill:999px;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(231,195,107,.28);color:#fff}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input{font:inherit;color:inherit}

.atmos{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 42% at 50% 8%, rgba(231,195,107,.09), rgba(231,195,107,.025) 45%, transparent 70%),radial-gradient(ellipse 120% 80% at 50% 100%, rgba(38,30,10,.38), rgba(0,0,0,.95));}

.app{position:relative;z-index:2;max-width:min(1060px,100%);margin:0 auto;padding:clamp(22px,4.5vw,40px) clamp(16px,4.5vw,34px) 110px}

/* ── header: the day + the count ── */
.head{margin-bottom:18px}
.eyebrow{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.24em;color:var(--gold);margin-bottom:9px}
.h-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px}
.h-title{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,7vw,2.7rem);line-height:1}
.h-date{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding-bottom:6px}
.demo-pill{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-cool);border:1px solid rgba(231,195,107,.4);border-radius:99px;padding:7px 13px;margin-bottom:2px;transition:all .25s;flex:none}
.demo-pill.on{background:var(--gold);color:var(--gold-ink);border-color:var(--gold)}

/* ── the count + fraction bar ── */
.tally{margin-top:14px;border:1px solid var(--border);background:var(--card);border-radius:var(--r-card);padding:16px 18px}
.tally .top{display:flex;justify-content:space-between;align-items:baseline}
.tally .n{font-family:var(--serif);font-size:1.75rem;font-variant-numeric:tabular-nums}
.tally .n b{font-weight:400;color:var(--gold-cool)}
.tally .lb{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.meter{margin-top:12px;height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.meter .fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#8a6d2f,var(--gold) 60%,var(--gold-cool));box-shadow:0 0 14px rgba(231,195,107,.35);transition:width .6s var(--ease)}
.tally.perfect .lb{color:var(--gold-cool)}

/* ── search + solid dropdown (the fixed one) ── */
.search{position:relative;margin:16px 0 4px;z-index:40}
.s-box{display:flex;align-items:center;gap:10px;border:1px solid var(--border-strong);background:rgba(255,255,255,.025);border-radius:14px;padding:13px 15px;transition:border-color .25s}
.s-box:focus-within{border-color:rgba(231,195,107,.5)}
.s-box svg{width:15px;height:15px;color:var(--muted);flex:none}
.s-box input{flex:1;background:none;border:0;outline:0;font-size:.95rem;color:var(--fg)}
.s-box input::placeholder{color:rgba(255,255,255,.32)}
.drops{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:50;
  background:var(--solid); /* SOLID. rows never show what is under them */
  border:1px solid var(--border-strong);border-radius:14px;overflow:hidden auto;max-height:315px;
  box-shadow:0 22px 54px -12px rgba(0,0,0,.85);display:none}
.drops.on{display:block;animation:dropIn .28s var(--ease)}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.drow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 14px;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:0}
.drow:hover{background:rgba(231,195,107,.07)}
.drow .ic{flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:rgba(231,195,107,.08);border:1px solid rgba(231,195,107,.2);color:var(--gold)}
.drow .ic svg{width:13px;height:13px}
.drow .bd{flex:1;min-width:0}
.drow .nm{font-size:.9rem}
.drow .nt{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drow .ds{font-family:var(--mono);font-size:.66rem;color:var(--gold-cool);flex:none}
.drow.custom .nm i{font-family:var(--serif);font-style:italic;color:var(--gold-cool)}

/* pairs-well chip */
.pair{display:none;margin:10px 2px 0;align-items:center;gap:9px;font-size:.82rem;color:var(--muted-strong)}
.pair.on{display:flex;animation:dropIn .3s var(--ease)}
.pair .k{font-family:var(--mono);font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.pair button{font-family:var(--serif);font-style:italic;color:var(--gold-cool);border-bottom:1px solid rgba(231,195,107,.4);padding-bottom:1px}

/* ── the day rail: time blocks ── */
.rail{margin-top:18px;display:flex;flex-direction:column}
.blk{display:flex;gap:14px;padding:16px 2px;border-top:1px solid rgba(255,255,255,.06)}
.blk:first-child{border-top:0}
.blk .side{flex:0 0 96px}
.blk .side .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(231,195,107,.07);border:1px solid rgba(231,195,107,.16);color:var(--gold);margin-bottom:8px}
.blk .side .ic svg{width:16px;height:16px}
.blk .side .t{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase}
.blk .side .w{font-family:var(--mono);font-size:.54rem;letter-spacing:.12em;color:var(--muted);margin-top:3px}
.blk .items{flex:1;min-width:0;display:flex;flex-direction:column;gap:9px}
.blk .empty{font-family:var(--serif);font-style:italic;color:rgba(255,255,255,.34);font-size:.92rem;padding-top:6px}

/* a supplement row */
.row{display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:var(--card);border-radius:15px;padding:12px 13px;transition:border-color .3s,opacity .3s;position:relative}
.row:hover{border-color:rgba(231,195,107,.26)}
.row .chk{flex:none;width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,.22);display:grid;place-items:center;color:transparent;transition:all .25s var(--ease);position:relative}
.row .chk svg{width:14px;height:14px}
.row .bd{flex:1;min-width:0}
.row .nm{font-size:.95rem;font-weight:500;transition:color .25s}
.row .meta{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}
.row .dose{font-family:var(--mono);font-size:.66rem;color:var(--muted-strong)}
.tag{font-family:var(--mono);font-size:.5rem;letter-spacing:.11em;text-transform:uppercase;border:1px solid;border-radius:99px;padding:3px 8px;display:inline-flex;align-items:center;gap:5px}
.tag.gold{color:var(--gold-cool);border-color:rgba(231,195,107,.35)}
.tag.violet{color:#c4b5fd;border-color:rgba(196,181,253,.35)}
.tag.sky{color:#9ad7f5;border-color:rgba(154,215,245,.32)}
.row .info{flex:none;color:rgba(255,255,255,.3);padding:6px;transition:color .25s}
.row .info:hover{color:var(--gold)}
.row .info svg{width:15px;height:15px}
.row .x{flex:none;color:rgba(255,255,255,.22);padding:6px 4px;font-size:1rem;line-height:1;transition:color .25s}
.row .x:hover{color:#f0a5a5}

/* taken state */
.row.done{opacity:.55}
.row.done .chk{background:var(--gold);border-color:var(--gold);color:var(--gold-ink)}
.row.done .nm{text-decoration:line-through;text-decoration-color:rgba(231,195,107,.6);color:var(--muted-strong)}

/* the three random pops (ported signature) */
@keyframes popK{0%{transform:scale(.6)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes rippleK{0%{box-shadow:0 0 0 0 rgba(231,195,107,.45)}100%{box-shadow:0 0 0 16px rgba(231,195,107,0)}}
@keyframes bounceK{0%{transform:scale(.5)}45%{transform:scale(1.3)}70%{transform:scale(.92)}100%{transform:scale(1)}}
.chk.animPop{animation:popK .45s var(--ease)}
.chk.animRipple{animation:popK .4s var(--ease),rippleK .6s ease-out}
.chk.animBounce{animation:bounceK .55s var(--spring)}

/* first use, never blank */
.first{margin-top:26px;text-align:center;display:none}
.first.on{display:block}
.first .l1{font-family:var(--serif);font-size:1.3rem;color:var(--muted-strong)}
.first button{margin-top:12px;font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-ink);background:var(--gold);border-radius:99px;padding:11px 20px}

/* ── when to take them ── */
.timing-btn{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));z-index:60;display:flex;align-items:center;gap:9px;background:var(--solid);border:1px solid rgba(231,195,107,.4);border-radius:99px;padding:13px 22px;font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-cool);box-shadow:0 14px 40px -8px rgba(0,0,0,.8)}
.timing-btn svg{width:14px;height:14px;color:var(--gold)}
.timing-btn:active{transform:translateX(-50%) scale(.97)}

.sheet-veil{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.72);opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-veil.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;background:var(--solid);border:1px solid var(--border-strong);border-bottom:0;border-radius:22px 22px 0 0;max-width:640px;margin:0 auto;padding:22px 20px calc(22px + env(safe-area-inset-bottom));transform:translateY(104%);transition:transform .5s var(--ease);max-height:86vh;overflow-y:auto}
.sheet.on{transform:none}
.sheet .grab{width:40px;height:4px;border-radius:99px;background:rgba(255,255,255,.16);margin:0 auto 16px}
.sheet h3{font-family:var(--serif);font-weight:400;font-size:1.45rem;margin-bottom:4px}
.sheet .sub{font-size:.84rem;color:var(--muted);margin-bottom:16px}
.sheet .k{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:14px 0 9px}
.tblocks{display:flex;gap:8px;flex-wrap:wrap}
.tb{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;border:1px solid rgba(231,195,107,.4);color:var(--gold-cool);border-radius:99px;padding:9px 15px;display:inline-flex;gap:7px;align-items:center;transition:all .25s}
.tb svg{width:12px;height:12px}
.tb.off{border-color:var(--border);color:rgba(255,255,255,.3)}
.tb-hint{font-size:.74rem;color:var(--muted);margin-top:8px}
/* the cozy reader (Vitality's Pop / cozy treatment, ported) */
.reader{margin-top:16px;display:none;border:1px solid var(--tone-soft,rgba(231,195,107,.35));background:rgba(255,255,255,.02);border-radius:16px;padding:15px;transition:border-color .5s var(--ease)}
.reader.on{display:block}
.reader[data-tone='gold']{--tone:#E7C36B;--tone-soft:rgba(231,195,107,.35);--tone-ink:#2a2107}
.reader[data-tone='violet']{--tone:#a78bfa;--tone-soft:rgba(167,139,250,.32);--tone-ink:#1b1233}
.reader .rt{font-family:var(--serif);font-style:italic;font-size:1.02rem;color:var(--tone,#E7C36B);transition:color .5s var(--ease)}
.rbar{margin-top:11px;height:4px;border-radius:99px;background:var(--border-strong);overflow:hidden}
.rbar span{display:block;height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,transparent,var(--tone,#E7C36B),transparent);animation:cozySlide 1.4s var(--ease) infinite}
.fact{margin-top:12px;min-height:3.4em}
.fact .tag{display:inline-block;font-family:var(--mono);font-size:.55rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--tone-ink,#2a2107);background:var(--tone,#E7C36B);border-radius:99px;padding:3px 10px;margin-bottom:8px;transition:background .5s var(--ease);animation:cozyTagPop .5s var(--spring)}
.fact .txt{font-weight:500;font-size:.95rem;line-height:1.4;color:#fff8ea;animation:cozyPop .55s var(--spring)}
.fact .txt b{color:var(--tone,#E7C36B);font-weight:700;transition:color .5s var(--ease)}
.rdots{display:flex;gap:6px;margin-top:11px}
.rdots i{width:6px;height:6px;border-radius:50%;background:var(--tone,#E7C36B);opacity:.4;animation:cozyDot 1.2s ease-in-out infinite;transition:background .5s var(--ease)}
.rdots i:nth-child(2){animation-delay:.2s}
.rdots i:nth-child(3){animation-delay:.4s}
@keyframes cozyTagPop{0%{opacity:0;transform:scale(.6) rotate(-6deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes cozyPop{0%{opacity:0;transform:scale(.8) translateY(8px)}60%{opacity:1;transform:scale(1.04)}100%{transform:scale(1) translateY(0)}}
@keyframes cozyDot{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
@keyframes cozySlide{from{transform:translateX(-120%)}to{transform:translateX(320%)}}
@media(prefers-reduced-motion:reduce){.rbar span{width:100%;animation:none;opacity:.5}.fact .tag,.fact .txt,.rdots i{animation:none}}
/* the editor the loader resolves into (ported from Vitality's ScheduleEditor) */
.edit-list{display:none;margin-top:14px}
.edit-list.on{display:block;animation:dropIn .4s var(--ease)}
.edit-item{border:1px solid var(--border);background:rgba(255,255,255,.02);border-radius:14px;padding:13px 14px;margin-bottom:10px}
.ei-head{display:flex;align-items:baseline;gap:10px}
.ei-name{font-size:.95rem;font-weight:500}
.ei-dose{font-family:var(--mono);font-size:.62rem;color:var(--gold-cool)}
.ei-row{display:flex;align-items:center;gap:9px;margin-top:10px;flex-wrap:wrap}
.ei-lbl{font-family:var(--mono);font-size:.52rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);flex:none}
.slot-pick{font-family:var(--mono);font-size:.56rem;letter-spacing:.08em;border:1px solid var(--border);color:var(--muted);border-radius:99px;padding:6px 11px;transition:all .2s}
.slot-pick.on{background:var(--gold);border-color:var(--gold);color:var(--gold-ink)}
.slot-pick:not(.on):hover{border-color:rgba(231,195,107,.45);color:var(--gold-cool)}
.ei-note{margin-top:9px;font-family:var(--serif);font-style:italic;font-size:.85rem;color:var(--muted-strong);line-height:1.45}
.ei-dose-in{font-family:var(--mono);font-size:.66rem;color:var(--gold-cool);background:rgba(255,255,255,.03);border:1px solid var(--border-strong);border-radius:9px;padding:6px 10px;outline:none;width:130px;transition:border-color .2s}
.ei-dose-in:focus{border-color:rgba(231,195,107,.5)}
.edit-hint{margin-top:12px;font-size:.85rem;color:var(--muted)}
.sheet .done-btn{display:block;width:100%;margin-top:18px;background:var(--gold);color:var(--gold-ink);font-weight:600;font-size:1rem;border-radius:15px;padding:15px;transition:transform .2s var(--spring)}
.sheet .done-btn:active{transform:scale(.98)}

/* detail sheet rows */
.d-name{font-family:var(--serif);font-size:1.5rem}
.d-dose{font-family:var(--mono);font-size:.66rem;color:var(--gold-cool);margin-top:4px}
.d-sec{margin-top:14px}
.d-sec .h{font-family:var(--mono);font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.d-sec p{font-size:.92rem;line-height:1.55;color:var(--muted-strong)}

.foot{margin-top:34px;text-align:center;font-family:var(--mono);font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.28)}

@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

<div class="atmos"></div>
<main class="app">

  <header class="head">
    <p class="eyebrow">The Stack</p>
    <div class="h-row">
      <h1 class="h-title">Every pill, one screen</h1>
      <span class="h-date" id="hDate"></span>
      <button class="demo-pill" id="demoBtn">demo data</button>
    </div>
  </header>

  <!-- @episode-start:checklist -->
  <section class="tally" id="tally">
    <div class="top"><span class="n"><b id="tN">0</b> of <span id="tM">0</span></span><span class="lb" id="tLb">taken today</span></div>
    <div class="meter"><div class="fill" id="tFill"></div></div>
  </section>
  <!-- @episode-end:checklist -->

  <!-- @episode-start:search -->
  <div class="search">
    <div class="s-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="text" placeholder="Search 100+ supplements to add" autocomplete="off">
    </div>
    <div class="drops" id="drops"></div>
  </div>
  <!-- @episode-end:search -->

  <!-- @episode-start:suggest -->
  <div class="pair" id="pair"></div>
  <!-- @episode-end:suggest -->

  <!-- @episode-start:blocks -->
  <section class="rail" id="rail"></section>
  <!-- @episode-end:blocks -->

  <div class="first" id="first">
    <p class="l1">Your stack starts here.</p>
    <button id="firstBtn">add your first supplement</button>
  </div>

  <p class="foot">saves on this device · yours forever</p>
</main>

<button class="timing-btn" id="timingBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
  When to take them
</button>

<div class="sheet-veil" id="veil"></div>

<!-- @episode-start:loader -->
<section class="sheet" id="timeSheet" aria-label="When to take them">
  <div class="grab"></div>
  <h3>When to take them</h3>
  <p class="sub">Turn off a block you do not use. Anything in it moves to Anytime.</p>
  <p class="k">Time blocks</p>
  <div class="tblocks" id="tblocks"></div>
  <p class="tb-hint" id="tbHint"></p>
  <p class="k">Your supplements</p>
  <div class="reader on" id="reader" data-tone="gold">
    <p class="rt">Reading your stack for the best timing</p>
    <div class="rbar"><span></span></div>
    <div class="fact" id="fact" hidden>
      <span class="tag" id="factTag">For you</span>
      <div class="txt" id="factTxt"></div>
      <div class="rdots"><i></i><i></i><i></i></div>
    </div>
  </div>
  <div class="edit-list" id="editList"></div>
  <button class="done-btn" id="timeDone">Done</button>
</section>
<!-- @episode-end:loader -->

<section class="sheet" id="infoSheet" aria-label="Supplement detail">
  <div class="grab"></div>
  <div id="infoBody"></div>
  <button class="done-btn" id="infoDone">Done</button>
</section>

<script>
let MEM = {};
let __t = null;
const __hasLS = (function(){ try { window.localStorage.setItem('__vt','1'); window.localStorage.removeItem('__vt'); return true; } catch(e){ return false; } })();
function __persist(){ clearTimeout(__t); __t = setTimeout(__flush, 400); }
function __flush(){
  if (window.Vitality && window.Vitality.save) { try { window.Vitality.save(MEM); } catch(e){} }
  else if (__hasLS) { try { window.localStorage.setItem('vitality.fuel.tile', JSON.stringify(MEM)); } catch(e){} }
}
addEventListener('pagehide', __flush);
document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'hidden') __flush(); });
const VStore = {
  getItem: function(k){ return Object.prototype.hasOwnProperty.call(MEM, k) ? MEM[k] : null },
  setItem: function(k, v){ MEM[k] = String(v); __persist(); },
  removeItem: function(k){ delete MEM[k]; __persist(); },
};
async function __loadMem(){
  if (window.Vitality && window.Vitality.load) {
    try { const d = await window.Vitality.load(); if (d && typeof d === 'object' && !Array.isArray(d)) return d; } catch(e){}
    return {};
  }
  if (__hasLS) { try { const raw = window.localStorage.getItem('vitality.fuel.tile'); if (raw){ const o = JSON.parse(raw); if (o && typeof o === 'object') return o; } } catch(e){} }
  return {};
}
async function __bootTile(){

function tagsFor(s){
  var t=[]; var txt=((s.note||'')+' '+(s.bestTime||'')).toLowerCase();
  if (PAIRS[s.id]==='caffeine'||s.id==='l-theanine') t.push(['violet','Pairs with caffeine']);
  if (txt.indexOf('consisten')>-1) t.push(['gold','Be consistent']);
  if (s.window==='bed') t.push(['violet','Before bed']);
  if (txt.indexOf('with food')>-1||txt.indexOf('with a meal')>-1||txt.indexOf('with meals')>-1||txt.indexOf('with dinner')>-1) t.push(['sky','With food']);
  if (txt.indexOf('empty stomach')>-1) t.push(['sky','Empty stomach']);
  return t.slice(0,2);
}

  WINDOWS.forEach(function(w){
    var items=ITEMS.filter(function(it){ return effWindow(it.window)===w.key; });
    if (S.offBlocks.indexOf(w.key)>-1 && w.key!=='anytime') return;
    var blk=document.createElement('div'); blk.className='blk';
    var side='<div class="side"><div class="ic">'+(WICON[w.key]||WICON.anytime)+'</div><div class="t">'+esc(w.title)+'</div><div class="w">'+esc(w.time)+'</div></div>';
    var list='<div class="items">';
    if (!items.length) list+='<div class="empty">Nothing yet</div>';
    items.forEach(function(it){
      var s=it.custom?it:byId(it.id)||it;
      var isDone=TKN.indexOf(it.u)>-1; if(isDone) done++;
      var tags=it.custom?[]:tagsFor(s);
      list+='<div class="row'+(isDone?' done':'')+'" data-u="'+it.u+'">'
        +'<button class="chk" aria-label="take">'+CHECK+'</button>'
        +'<div class="bd"><div class="nm">'+esc(itemName(it))+'</div><div class="meta"><span class="dose">'+esc(it.dose||s.dose||'')+'</span>'
        +tags.map(function(t){return '<span class="tag '+t[0]+'">'+esc(t[1])+'</span>'}).join('')
        +'</div></div>'
        +(it.custom?'':'<button class="info" aria-label="what is this">'+INFO+'</button>')
        +'<button class="x" aria-label="remove">×</button></div>';
    });
    list+='</div>';
    blk.innerHTML=side+list; rail.appendChild(blk);
  });
  /* tally */
  document.getElementById('tN').textContent=done;
  document.getElementById('tM').textContent=total;
  document.getElementById('tFill').style.width=(total?Math.round(done/total*100):0)+'%';
  document.getElementById('tLb').textContent = (DEMO_ON?'demo · ':'') + (total&&done===total ? 'stack complete' : 'taken today');
  document.getElementById('tally').classList.toggle('perfect', total>0&&done===total);
  document.getElementById('first').classList.toggle('on', total===0);
  if(!DEMO_ON) save();
}

/* row interactions (event delegation) */
document.getElementById('rail').addEventListener('click', function(e){
  var row=e.target.closest('.row'); if(!row) return;
  var u=row.getAttribute('data-u');
  var IT=liveItems(), TK=liveTaken();
  if (e.target.closest('.x')){ var keep=IT.filter(function(it){return it.u!==u}); if(DEMO_ON){DEMO_ITEMS=keep;}else{S.items=keep;} var kt=TK.filter(function(n){return n!==u}); if(DEMO_ON){DEMO_TAKEN=kt;}else{S.taken=kt;} render(); return; }
  if (e.target.closest('.info')){ var it=IT.filter(function(it){return it.u===u})[0]; if(it&&!it.custom){ openInfo(byId(it.id)); } return; }
  if (e.target.closest('.chk')||e.target.closest('.bd')){
    var i=TK.indexOf(u);
    if(i>-1){ TK.splice(i,1); render(); }
    else{
      TK.push(u);
      var chk=row.querySelector('.chk');
      chk.classList.add(POPS[Math.floor(Math.random()*POPS.length)]);
      setTimeout(render, 340);
    }
  }
});

/* ── search ── */
var q=document.getElementById('q'), drops=document.getElementById('drops');
function inStack(id){ return liveItems().some(function(it){return it.id===id}); }
function searchDb(raw){
  var v=raw.trim().toLowerCase(); if(!v) return [];
  var starts=[], contains=[];
  DB.forEach(function(s){
    var n=s.name.toLowerCase();
    var alias=(s.aliases||[]).map(function(a){return a.toLowerCase()});
    if (n.indexOf(v)===0 || alias.some(function(a){return a.indexOf(v)===0})) starts.push(s);
    else if (n.indexOf(v)>-1 || alias.some(function(a){return a.indexOf(v)>-1})) contains.push(s);
  });
  starts.sort(function(a,b){return a.name.localeCompare(b.name)});
  return starts.concat(contains).slice(0,8);
}
q.addEventListener('input', function(){
  var v=q.value.trim();
  if(!v){ drops.classList.remove('on'); drops.innerHTML=''; return; }
  var hits=searchDb(v);
  var html=hits.map(function(s){
    return '<button class="drow" data-id="'+s.id+'"><span class="ic">'+PILL+'</span><span class="bd"><span class="nm">'+esc(s.name)+'</span><br><span class="nt">'+esc(s.helps||s.note||'')+'</span></span><span class="ds">'+esc(s.dose)+'</span></button>';
  }).join('');
  html+='<button class="drow custom" data-custom="'+esc(v)+'"><span class="ic">'+PILL+'</span><span class="bd"><span class="nm">Add <i>"'+esc(v)+'"</i></span><br><span class="nt">custom supplement · anytime</span></span></button>';
  drops.innerHTML=html; drops.classList.add('on');
});
document.addEventListener('click', function(e){ if(!e.target.closest('.search')) { drops.classList.remove('on'); } });
drops.addEventListener('click', function(e){
  var b=e.target.closest('.drow'); if(!b) return;
  var TGT=liveItems();
  if (b.hasAttribute('data-custom')){ TGT.push({u:uid(),custom:true,name:b.getAttribute('data-custom'),dose:'',window:'anytime'}); }
  else { var s=byId(b.getAttribute('data-id')); if(s){ TGT.push({u:uid(),id:s.id,window:s.window,dose:s.dose||''}); suggestFor(s.id); } }
  q.value=''; drops.classList.remove('on'); drops.innerHTML=''; render();
});
document.getElementById('firstBtn').addEventListener('click', function(){ q.focus(); });

/* pairs-well suggestion */
function suggestFor(id){
  var mate=PAIRS[id]; var el=document.getElementById('pair');
  if(!mate||inStack(mate)||!byId(mate)){ el.classList.remove('on'); return; }
  var s=byId(mate);
  el.innerHTML='<span class="k">Pairs well</span><span>'+esc(byId(id).name)+' goes with</span><button data-add="'+mate+'">'+esc(s.name)+' · add it</button>';
  el.classList.add('on');
  el.onclick=function(ev){ var b=ev.target.closest('[data-add]'); if(!b) return; liveItems().push({u:uid(),id:mate,window:s.window,dose:s.dose||''}); el.classList.remove('on'); render(); };
  setTimeout(function(){ el.classList.remove('on'); }, 9000);
}

function paintBlocks(){
  var wrap=document.getElementById('tblocks');

});

/* the cozy reader: Vitality's Pop / cozy mechanic, deterministic, reads YOUR stack */
var TAGS=['For you','Timing tip','Did you know'];
var TONES=['gold','violet'];
function runReader(){
  var reader=document.getElementById('reader'), fact=document.getElementById('fact');
  var tagEl=document.getElementById('factTag'), txtEl=document.getElementById('factTxt');
  fact.hidden=true; reader.classList.add('on'); reader.setAttribute('data-tone','gold');
  var el=document.getElementById('editList'); el.classList.remove('on'); el.innerHTML='';
  clearTimeout(window.__fyHand);
  var pool=liveItems().filter(function(it){return !it.custom}).map(function(it){ var s=byId(it.id); return s?{n:s.name,t:s.bestTime||s.note}:null; }).filter(Boolean);
  if(!pool.length) pool=[{n:'Your stack',t:'Add a supplement and I will read its best timing for you.'}];
  clearTimeout(window.__fyBoot); clearInterval(window.__fyInt);
  var i=0, k=0;
  function show(){
    var L=pool[i%pool.length];
    reader.setAttribute('data-tone', TONES[k%TONES.length]);
    tagEl.textContent=TAGS[k%TAGS.length];
    txtEl.innerHTML='<b>'+esc(L.n)+':</b> '+esc(L.t);
    /* re-key so the pop replays, exactly like the real one */
    tagEl.style.animation='none'; txtEl.style.animation='none';
    void tagEl.offsetWidth;
    tagEl.style.animation=''; txtEl.style.animation='';
  }
  window.__fyBoot=setTimeout(function(){
    fact.hidden=false; show();
    window.__fyInt=setInterval(function(){ i++; k++; show(); }, 3000);
    /* the loader resolves: hand over to the real editor after one beat */
    window.__fyHand=setTimeout(function(){
      clearInterval(window.__fyInt);
      reader.classList.remove('on');
      buildEditList();
    }, 3400);
  }, 1500);
}
/* the per-supplement schedule editor (what /fuel actually gives you) */
function buildEditList(){
  var box=document.getElementById('editList');
  var items=liveItems();
  if(!items.length){ box.innerHTML='<p class="edit-hint">Add supplements on the stack first, then schedule them here.</p>'; box.classList.add('on'); return; }
  box.innerHTML=items.map(function(it,idx){
    var s=it.custom?it:(byId(it.id)||it);
    var pills=WINDOWS.map(function(w){
      return '<button class="slot-pick'+(effWindow(it.window)===w.key?' on':'')+'" data-ei="'+idx+'" data-w="'+w.key+'">'+esc(w.title)+'</button>';
    }).join('');
    return '<div class="edit-item">'
      +'<div class="ei-head"><span class="ei-name">'+esc(itemName(it))+'</span></div>'
      +'<div class="ei-row"><span class="ei-lbl">Dose</span><input class="ei-dose-in" data-ei="'+idx+'" value="'+esc(it.dose||s.dose||'')+'" placeholder="e.g. 200 mg"></div>'
      +'<div class="ei-row"><span class="ei-lbl">Time</span>'+pills+'</div>'
      +(it.custom||!s.bestTime?'':'<div class="ei-note">'+esc(s.bestTime)+'</div>')
      +'</div>';
  }).join('');
  box.classList.add('on');
}
document.getElementById('editList').addEventListener('click', function(e){
  var b=e.target.closest('.slot-pick'); if(!b) return;
  var it=liveItems()[Number(b.getAttribute('data-ei'))]; if(!it) return;
  it.window=b.getAttribute('data-w');
  if(!DEMO_ON) save();
  buildEditList(); render();
});
document.getElementById('editList').addEventListener('change', function(e){
  var inp=e.target.closest('.ei-dose-in'); if(!inp) return;
  var it=liveItems()[Number(inp.getAttribute('data-ei'))]; if(!it) return;
  it.dose=inp.value.trim();
  if(!DEMO_ON) save();
  render();
});
